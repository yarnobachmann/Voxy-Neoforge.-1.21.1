def sodiumVersion = "mc1.21.1-0.8.12-alpha.4-neoforge"
def sodiumNestedJar = "META-INF/jarjar/net.caffeinemc.sodium-neoforge-0.8.12-alpha.4+mc1.21.1-mod.jar"
def sodiumCompileJar = layout.buildDirectory.file("generated/compile-deps/sodium-neoforge-0.8.12-alpha.4-mod.jar")

tasks.register("extractSodiumCompileJar", Copy) {
    from({
        zipTree(configurations.sodiumDistribution.singleFile).matching {
            include sodiumNestedJar
        }
    })
    into(sodiumCompileJar.map { it.asFile.parentFile })
    eachFile {
        path = name
    }
    includeEmptyDirs = false
    rename { "sodium-neoforge-0.8.12-alpha.4-mod.jar" }
}

dependencies {
    // To change the versions see the gradle.properties file
    implementation "net.neoforged:neoforge:${project.neoforge_version}"

    // Forgified Fabric API for compatibility (includes Fabric Loader API)
    implementation "org.sinytra.forgified-fabric-api:forgified-fabric-api:${project.forgified_fabric_version}"

    // Sodium for NeoForge (matches the 0.8 alpha used by the target modpack)
    sodiumDistribution "maven.modrinth:sodium:${sodiumVersion}"
    implementation "maven.modrinth:sodium:${sodiumVersion}"
    compileOnly files(sodiumCompileJar).builtBy(tasks.named("extractSodiumCompileJar"))

    // Lithium for NeoForge (0.15.1 - latest for MC 1.21.1)
    implementation("maven.modrinth:lithium:mc1.21.1-0.15.1-neoforge")

    // Optional mod dependencies - commented out for initial port
    // TODO: Add NeoForge versions when available
    //compileOnly "drouarb:nvidium:0.4.1-beta4:1.21.6@jar"
    //compileOnly("maven.modrinth:modmenu:17.0.0-alpha.1")
    compileOnly("curse.maven:irisshaders-455508:6661598")
