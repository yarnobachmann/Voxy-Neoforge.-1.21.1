jar {
    from("LICENSE") {
        rename { "${it}_${project.archives_base_name}"}
    }
}

def pythonExecutable = System.getProperty('os.name').toLowerCase(Locale.ROOT).contains('windows') ? 'python' : 'python3'

// Validate mixin configuration (registration, exclusions, remap flags)
task validateMixinConfig(type: Exec) {
    description = 'Validates mixin registration, exclusions, and configuration'
    group = 'verification'

    commandLine pythonExecutable, 'scripts/validate_mixin_config.py'
    environment 'PYTHONIOENCODING', 'utf-8'

    // Only run if script exists
    onlyIf {
        file('scripts/validate_mixin_config.py').exists()
    }
}

// Validate mixin target signatures before compilation
task validateMixinSignatures(type: Exec) {
    description = 'Validates @Inject/@Shadow targets against Minecraft source'
    group = 'verification'

    commandLine pythonExecutable, 'scripts/validate_mixin_targets.py'
    environment 'PYTHONIOENCODING', 'utf-8'

    // Only run if script and MC sources exist
    onlyIf {
        file('scripts/validate_mixin_targets.py').exists() &&
        file('.reference/minecraft/1.21.1/decompiled').exists()
    }

    // Ignore failures if sources not available or script has issues (optional validation)
    ignoreExitValue = true
}

// Validate mixin configurations after JAR creation
task validateMixins(type: Exec) {
    dependsOn jar

    description = 'Validates that all mixins declared in JSON configs are present in the JAR'
    group = 'verification'

    commandLine pythonExecutable, 'scripts/validate_mixins.py'
    environment 'PYTHONIOENCODING', 'utf-8'

    // Only run if script exists
    onlyIf {
        file('scripts/validate_mixins.py').exists()
    }
}

// Run validations as part of build process
compileJava.dependsOn validateMixinConfig       // Before compilation (config check)
compileJava.dependsOn validateMixinSignatures   // Before compilation (signature check)
build.dependsOn validateMixins                   // After JAR creation (content check)



