plugins {
    id 'net.neoforged.moddev' version "2.0.42-beta"
    id 'maven-publish'
}

def isInGHA = System.getenv("GITHUB_ACTIONS") == "true"

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

// Exclude optional integrations from compilation - not all available for NeoForge 1.21.1
// These can be re-enabled once NeoForge versions become available
sourceSets {
    main {
        java {
            // Legacy Fabric config page jumper
            exclude 'me/cortex/voxy/client/config/IConfigPageSetter.java'

            // ModMenu integration (Fabric-only)
            exclude 'me/cortex/voxy/client/config/ModMenuIntegration.java'

            // Vivecraft VR integration - ViewportSelector now NeoForge-compatible
            // ViewportSelector no longer excluded

            // Flashback integration mixins
            exclude 'me/cortex/voxy/client/mixin/flashback/**'

            // Nvidium integration mixins
            exclude 'me/cortex/voxy/client/mixin/nvidium/**'

            // Debug screen integration (API changed in MC 1.21.1)
            exclude 'me/cortex/voxy/client/VoxyDebugScreenEntry.java'
            exclude 'me/cortex/voxy/client/mixin/minecraft/MixinDebugScreenEntryList.java'

            // Obsolete Sodium Options API integration. Sodium 0.8 uses Sodium's built-in config API instead.
            exclude 'me/cortex/voxy/client/config/VoxySodiumOptions.java'

            // Legacy Sodium config integration mixin
            exclude 'me/cortex/voxy/client/mixin/sodium/MixinVideoSettingsScreen.java'

            // Blaze3D OpenGL debug mixin (GlDebug class not accessible in MC 1.21.1)
            exclude 'me/cortex/voxy/client/mixin/minecraft/MixinGlDebug.java'

            // MixinFogRenderer now compatible with MC 1.21.1 (rewritten to target net.minecraft.client.renderer.FogRenderer)

            // BlockableEventLoop mixin (isNonRecoverable method removed in MC 1.21.1 - Issue #2)
            exclude 'me/cortex/voxy/client/mixin/minecraft/MixinBlockableEventLoop.java'
        }
    }
}

repositories {
    exclusiveContent {
        forRepository {
            maven {
                name = "Modrinth"
                url = "https://api.modrinth.com/maven"
            }
        }
        filter {
            includeGroup "maven.modrinth"
        }
    }

    exclusiveContent {
        forRepository {
            maven {
                name "caffeinemcRepository"
                url "https://maven.caffeinemc.net/snapshots"
            }
        }
        filter {
            includeGroup "net.caffeinemc"
        }
    }

    // Forgified Fabric API for NeoForge
    maven {
        name = "Sinytra"
        url = "https://maven.su5ed.dev/releases"
    }

    maven { url = "https://maven.shedaniel.me/" }
    maven { url = "https://maven.terraformersmc.com/releases/" }
    maven {
        name = "CurseMaven"
        url = "https://cursemaven.com"
    }

    exclusiveContent {
        forRepository {
            ivy {
                name = "github"
                url = "https://github.com/"
                patternLayout {
                    artifact '/[organisation]/[module]/releases/download/[revision]/[module]-[revision]-[classifier].[ext]'
                }
                metadataSources {
                    artifact()
                }
            }
        }
        filter {
            includeModuleByRegex("[^\\.]+", "nvidium")
        }
    }
}


def gitCommitHash = { ->
    try {
        ExecOutput result = providers.exec {
            commandLine = ['git', 'rev-parse', '--short', 'HEAD']
            ignoreExitValue = true
        }

        if (result.getResult().get().getExitValue() != 0) {
            return "<UnknownCommit>";
        } else {
            return result.standardOutput.asText.get().strip();
        }
    } catch (Exception e) {
        e.printStackTrace()
        return "<UnknownCommit>";
    }
}

def buildtime = {System.currentTimeSeconds()}

processResources {
    def time = buildtime()
    def hash = gitCommitHash()
    def version = project.version

    inputs.properties("version": version, "commit": hash, "buildtime": time)
    filesMatching("META-INF/neoforge.mods.toml") {
        expand "version": version, "commit": hash, "buildtime": time
    }

    // Exclude leftover Fabric metadata from NeoForge build
    exclude 'fabric.mod.json'
    exclude 'voxy.accesswidener'
}

neoForge {
    version = project.neoforge_version

    // Validate access transformers at build time to catch invalid targets
    // Temporarily disabled to debug build issue
    // validateAccessTransformers = true

    accessTransformers {
        file('src/main/resources/META-INF/accesstransformer.cfg')
    }

    parchment {
        minecraftVersion = project.minecraft_version
        mappingsVersion = "2024.11.17"
    }
}

def modRuntimeOnlyMsk = {arg->}
if (!isInGHA) {
    modRuntimeOnlyMsk = { arg ->
        dependencies {
            modRuntimeOnly(arg)
        }
    }
}

configurations {
    sodiumDistribution
